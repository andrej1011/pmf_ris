spring.application.name=BolnicaWeb
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/ris_bolnica}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:RIS_B0ln1cka-baza}
spring.datasource.hikari.maximum-pool-size=2
server.servlet.context-path=/Bolnica
server.port=${PORT:8080}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
# If you want Hibernate to automatically fix the schema (use with caution in production)
spring.jpa.hibernate.ddl-auto=update
server.servlet.session.timeout=10m

